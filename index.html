<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurevia &mdash; The Art of Soft Luxury</title>
    <meta name="description" content="Handmade pearl jewellery for moments that matter." />
    <meta name="theme-color" content="#FDFBF7" />

    <!-- Favicon: inline SVG pearl motif -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23fdfaf6' stroke='%23C9A96E' stroke-width='1.5'/%3E%3Ccircle cx='11' cy='11' r='3' fill='white' opacity='0.9'/%3E%3C/svg%3E" />

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Google Fonts: strictly non-render-blocking -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@200;300;400;500&family=La+Belle+Aurore&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@200;300;400;500&family=La+Belle+Aurore&display=swap"
      />
    </noscript>

    <!-- Loading screen: critical inline CSS — renders before any JS downloads -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      #app-loader {
        position: fixed;
        inset: 0;
        height: 100vh;
        height: 100dvh; /* Real centering on mobile */
        z-index: 99999;
        background: #FDFBF7;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      }

      #app-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* ── Pearl ── */
      .loader-pearl-wrap {
        position: relative;
        width: 80px;
        height: 80px;
        margin-bottom: 32px;
      }

      /* Outer pulsing ring */
      .loader-pearl-ring {
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        border: 1px solid rgba(201, 169, 110, 0.25);
        animation: pearl-ring 2.4s ease-in-out infinite;
      }
      .loader-pearl-ring:nth-child(2) {
        inset: -22px;
        border-color: rgba(201, 169, 110, 0.12);
        animation-delay: 0.4s;
      }

      @keyframes pearl-ring {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%       { transform: scale(1.08); opacity: 0.6; }
      }

      /* Pearl body */
      .loader-pearl-body {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: #fdfaf6;
        box-shadow:
          inset -8px -14px 24px rgba(180, 170, 190, 0.28),
          inset  6px  6px 16px rgba(255, 255, 255, 1),
          0 12px 36px rgba(0, 0, 0, 0.07),
          0  4px 12px rgba(201, 169, 110, 0.12);
        animation: pearl-breathe 2.4s ease-in-out infinite;
      }

      /* Iridescent sheen */
      .loader-pearl-sheen {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: conic-gradient(
          from 180deg at 50% 50%,
          #fce9f1 0%, #ddf0ff 25%, #e6ddf8 50%, #fce9f1 75%, #ddf0ff 100%
        );
        opacity: 0.35;
        mix-blend-mode: color-burn;
        animation: pearl-rotate 8s linear infinite;
      }

      /* Highlight dot */
      .loader-pearl-highlight {
        position: absolute;
        top: 14%;
        left: 20%;
        width: 26%;
        height: 20%;
        border-radius: 50%;
        background: white;
        filter: blur(1.5px);
        opacity: 0.9;
        transform: rotate(-25deg);
      }

      @keyframes pearl-breathe {
        0%, 100% { transform: scale(1); }
        50%       { transform: scale(1.04); }
      }

      @keyframes pearl-rotate {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      /* ── Wordmark ── */
      .loader-title {
        font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
        font-style: italic;
        font-weight: 400;
        font-size: clamp(2rem, 8vw, 3.5rem);
        letter-spacing: 0.35em;
        color: #2C2826;
        line-height: 1;
        animation: loader-word-in 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
      }

      .loader-sub {
        font-family: 'Outfit', system-ui, sans-serif;
        font-weight: 300;
        font-size: 9px;
        letter-spacing: 0.45em;
        text-transform: uppercase;
        color: #C9A96E;
        margin-top: 10px;
        animation: loader-word-in 1s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
      }

      @keyframes loader-word-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Progress bar ── */
      .loader-bar-wrap {
        width: 140px;
        height: 1px;
        background: rgba(201, 169, 110, 0.15);
        margin-top: 40px;
        position: relative;
        border-radius: 2px;
        overflow: hidden;
        animation: loader-word-in 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
      }

      .loader-bar-fill {
        height: 100%;
        background: #C9A96E;
        width: 100%;
        transform-origin: left;
        transform: scaleX(0);
        border-radius: 2px;
        will-change: transform;
        /* Simulates natural network loading stutter */
        animation: fake-loading 1.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      }

      @keyframes fake-loading {
        0%   { transform: scaleX(0); }
        35%  { transform: scaleX(0.45); }
        60%  { transform: scaleX(0.75); }
        85%  { transform: scaleX(0.85); }
        100% { transform: scaleX(1); }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen: visible immediately, before any JS runs -->
    <div id="app-loader" aria-hidden="true" aria-label="Loading Aurevia">
      <div class="loader-pearl-wrap">
        <div class="loader-pearl-ring"></div>
        <div class="loader-pearl-ring"></div>
        <div class="loader-pearl-body">
          <div class="loader-pearl-sheen"></div>
          <div class="loader-pearl-highlight"></div>
        </div>
      </div>
      <div class="loader-title">AUREVIA</div>
      <div class="loader-sub">The art of soft luxury</div>
      <div class="loader-bar-wrap">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <!-- Interactive script for the splash screen: 3D parallax effect -->
    <script>
      (function() {
        const wrap = document.querySelector('.loader-pearl-wrap');
        const title = document.querySelector('.loader-title');
        const sub = document.querySelector('.loader-sub');
        if (!wrap || !title || !sub) return;

        let mouseX = 0;
        let mouseY = 0;
        let currentX = 0;
        let currentY = 0;

        function updateMouse(x, y) {
          const w = window.innerWidth;
          const h = window.innerHeight;
          // Normalize to range [-1, 1]
          mouseX = (x / w) * 2 - 1;
          mouseY = (y / h) * 2 - 1;
        }

        window.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0) updateMouse(e.touches[0].clientX, e.touches[0].clientY);
        });

        function animate() {
          const loader = document.getElementById('app-loader');
          // Stop animating if loader is removed (React finished hydrating)
          if (!loader || !document.contains(loader)) return;

          // Smooth lerp
          currentX += (mouseX - currentX) * 0.08;
          currentY += (mouseY - currentY) * 0.08;

          // Apply 3D parallax transformations
          wrap.style.transform = `perspective(800px) rotateX(${-currentY * 30}deg) rotateY(${currentX * 30}deg) translate(${currentX * 15}px, ${currentY * 15}px)`;
          title.style.transform = `perspective(800px) translate(${currentX * 8}px, ${currentY * 8}px)`;
          sub.style.transform = `perspective(800px) translate(${currentX * -5}px, ${currentY * -5}px)`;

          requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
